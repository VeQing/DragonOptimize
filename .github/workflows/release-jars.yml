name: Build and upload release jars

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: true
        default: "1.0.1"
        type: choice
        options:
          - "1.0.0"
          - "1.0.1"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"

      - name: Setup Gradle 4.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "4.1"

      - name: Apply version
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path("build.gradle")
          s = p.read_text()
          s = s.replace('version = "1.0.1"', 'version = "${{ inputs.version }}"', 1)
          s = s.replace('version = "1.0.0"', 'version = "${{ inputs.version }}"', 1)
          p.write_text(s)
          PY
          sed -i "s/public static final String VERSION = \".*\";/public static final String VERSION = \"${{ inputs.version }}\";/" src/main/java/com/dragoncore/optimize/DragonOptimize.java
          sed -i "s/mod_version=.*/mod_version=${{ inputs.version }}/" gradle.properties

      - name: Build jar
        run: |
          gradle build --no-daemon

      - name: Rename jar
        run: |
          mkdir -p out
          cp build/libs/*.jar "out/dragonoptimize-${{ inputs.version }}.jar"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ inputs.version }}"
          files: "out/dragonoptimize-${{ inputs.version }}.jar"
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
